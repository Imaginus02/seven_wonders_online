spring.application.name=wonders

# H2 Database Configuration - Persistent Mode
# Database is stored in ./data/wondersdb (relative to project root)
# Use file-based H2 for persistence across restarts
spring.datasource.url=jdbc:h2:file:./data/wondersdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console for database management
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
# Use 'update' for development (auto-creates/updates schema)
# For production: switch to 'validate' and use Flyway/Liquibase for migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SQL Initialization
# Defer data.sql until after Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
# Don't run data.sql automatically - we'll use DataInitializer class instead
spring.sql.init.mode=never

# For local troubleshooting, temporarily set spring.jpa.show-sql=true

# Exclude H2 internal classes from JPA scanning
spring.jpa.mapping-resources=
# Static assets are served from classpath:/static/ (Spring Boot default)