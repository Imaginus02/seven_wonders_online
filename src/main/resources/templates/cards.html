<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards - 7 Wonders Online</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/home" class="btn btn-success back-link">
                <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                <span>Back to Home</span>
            </a>
        </div>

        <div class="page-header">
            <h1 class="page-title">Cards of Seven Wonders</h1>
        </div>

        <!-- Iterate through Ages -->
        <div th:each="ageEntry : ${cardsByAgeAndType}">
            <div class="age-section">
                <div class="age-title" th:text="${ageEntry.key}"></div>
                
                <!-- Iterate through Card Types (Colors) within this Age -->
                <div class="type-grid">
                    <div th:each="typeEntry : ${ageEntry.value}" 
                         th:classappend="${typeEntry.key}"
                         class="type-section">
                        <div class="type-title" th:text="${typeEntry.key}"></div>
                        
                        <!-- Iterate through Cards within this Type -->
                        <div class="cards-container">
                            <div th:each="card : ${typeEntry.value}" class="card-row">
                                <!-- Card Image -->
                                <div class="card-image">
                                    <div th:if="${card.image}" class="card-image-content">
                                        <img th:src="@{/assets/cards/{img}(img=${card.image})}" 
                                             th:alt="${card.name}"
                                             class="card-image-img">
                                    </div>
                                    <div th:if="!${card.image}" class="no-image">No Image</div>
                                </div>
                                
                                <!-- Card Info -->
                                <div class="card-info">
                                    <div class="card-name" th:text="${card.name}"></div>
                                    <div class="card-details">
                                        <div class="badge" th:text="'👥 ' + ${card.minPlayerCount} + '+'"></div>
                                        <div class="badge" th:if="${card.coinCost > 0}" 
                                             th:text="'💰 ' + ${card.coinCost}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
