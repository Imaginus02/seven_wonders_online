<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Game - 7 Wonders Online</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/create-game.css}">
</head>
<body>
<div class="container create-game-page">
<div class="create-game-container">
    <div class="nav">
        <a href="/games" class="btn btn-secondary back-link">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            <span>Back to Games</span>
        </a>
    </div>

    <h1 class="page-title">Create New Game</h1>
    <p class="subtitle">Select 3-7 players to start a new game</p>

    <div th:if="${error}" class="error-message show" th:text="${error}"></div>

    <div class="info-box">
        <span class="material-symbols-outlined" aria-hidden="true">info</span>
        <span>Select between <strong>3 and 7 players</strong> to create the game</span>
    </div>

    <form method="POST" id="createGameForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-section">
            <div class="section-title">Player Selection</div>

            <div class="player-counter">
                <div class="counter-info">
                    <span class="counter-value" id="playerCount">0</span>
                    <span class="counter-text">/ 7 Players Selected</span>
                </div>
                <div class="counter-status invalid" id="counterStatus">Need 3+ players</div>
            </div>

            <div class="users-grid">
                <div th:each="user : ${users}">
                    <input type="checkbox" 
                           th:id="'user_' + ${user.id}" 
                           name="playerIds" 
                           th:value="${user.id}"
                           class="user-checkbox"
                           onchange="updatePlayerCount()">
                    <label th:for="'user_' + ${user.id}" class="user-label" th:text="${user.username}">User</label>
                </div>
            </div>

            <p class="help-text">Click on a player to select or deselect them</p>
        </div>

        <div class="button-group">
            <a href="/games" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn" disabled>Create Game</button>
        </div>
    </form>
</div>
</div>

<script>
    function updatePlayerCount() {
        const checkboxes = document.querySelectorAll('input[name="playerIds"]:checked');
        const count = checkboxes.length;
        const submitBtn = document.getElementById('submitBtn');
        const counterStatus = document.getElementById('counterStatus');
        const playerCountSpan = document.getElementById('playerCount');

        playerCountSpan.textContent = count;

        if (count >= 3 && count <= 7) {
            submitBtn.disabled = false;
            counterStatus.classList.remove('invalid');
            counterStatus.classList.add('valid');
            counterStatus.textContent = '✓ Ready to create';
        } else if (count > 7) {
            submitBtn.disabled = true;
            counterStatus.classList.remove('valid');
            counterStatus.classList.add('invalid');
            counterStatus.textContent = 'Too many players';
        } else {
            submitBtn.disabled = true;
            counterStatus.classList.remove('valid');
            counterStatus.classList.add('invalid');
            counterStatus.textContent = 'Need ' + (3 - count) + ' more';
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        updatePlayerCount();
    });

    // Validate before submit
    document.getElementById('createGameForm').addEventListener('submit', function(e) {
        const checkboxes = document.querySelectorAll('input[name="playerIds"]:checked');
        if (checkboxes.length < 3 || checkboxes.length > 7) {
            e.preventDefault();
            alert('Please select between 3 and 7 players');
        }
    });
</script>
</body>
</html>
