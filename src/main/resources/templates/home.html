<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - 7 Wonders Online</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>7 Wonders Online</h1>
                <p>Welcome, <span th:text="${username}">User</span>!</p>
            </div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-btn">
                    <span class="material-symbols-outlined" aria-hidden="true">logout</span>
                    <span>Logout</span>
                </button>
            </form>
        </div>

        <!-- Main Sections -->
        <div class="sections">
            <!-- View Games Section -->
            <div class="section">
                <h2>
                    <span class="material-symbols-outlined" aria-hidden="true">sports_esports</span>
                    Games
                </h2>
                <div class="section-links">
                    <a href="/games" class="section-link games">
                        <span class="material-symbols-outlined" aria-hidden="true">list</span>
                        <span>View All Games</span>
                    </a>
                </div>
            </div>

            <!-- Wiki Section -->
            <div class="section">
                <h2>
                    <span class="material-symbols-outlined" aria-hidden="true">library_books</span>
                    Wiki
                </h2>
                <div class="section-links">
                    <a href="/cards" class="section-link wiki">
                        <span class="material-symbols-outlined" aria-hidden="true">style</span>
                        <span>View Cards</span>
                    </a>
                    <a href="/wonders" class="section-link wiki">
                        <span class="material-symbols-outlined" aria-hidden="true">monument</span>
                        <span>View Wonders</span>
                    </a>
                </div>
            </div>

            <!-- Admin Section -->
            <div class="section admin-section" th:classappend="${isAdmin} ? 'visible'">
                <h2>
                    <span class="material-symbols-outlined" aria-hidden="true">admin_panel_settings</span>
                    Administration
                </h2>
                <div class="section-links">
                    <a href="/admin/logs" class="section-link admin">
                        <span class="material-symbols-outlined" aria-hidden="true">description</span>
                        <span>View Logs</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
