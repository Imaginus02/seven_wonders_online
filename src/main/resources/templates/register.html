<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 7 Wonders Online</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <div class="container auth-page">
        <div class="register-container">
            <div class="register-header">
                <h1>Register for 7 Wonders Online</h1>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${userDTO}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username" th:field="*{username}" required>
                    <div th:if="${#fields.hasErrors('username')}" class="alert alert-error field-error" th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" th:field="*{password}" required>
                    <div th:if="${#fields.hasErrors('password')}" class="alert alert-error field-error" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" required>
                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="alert alert-error field-error" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-success btn-register">
                    <span class="material-symbols-outlined" aria-hidden="true">person_add</span>
                    <span>Register</span>
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </div>
</body>
</html>
