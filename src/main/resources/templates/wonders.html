<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonders - 7 Wonders Online</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/wonders.css}">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/home" class="btn btn-success back-link">
                <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                <span>Back to Home</span>
            </a>
        </div>

        <div class="page-header">
            <h1 class="page-title">7 Wonders Boards</h1>
            <p class="welcome" th:if="${username}">Signed in as <strong th:text="${username}">User</strong></p>
        </div>

        <div th:if="${#lists.isEmpty(wonders)}" class="empty">
            No wonders available yet. Add them via the database or API.
        </div>

        <div class="wonders-grid" th:if="${!#lists.isEmpty(wonders)}">
            <div class="wonder-card" th:each="wonder : ${wonders}">
                <img th:if="${wonder.image}" 
                     th:src="@{'/assets/wonders/' + ${wonder.image}}" 
                     th:alt="${wonder.name}"
                     class="wonder-image"
                     onerror="this.style.display='none'">
                
                <div class="wonder-name" th:text="${wonder.name}">Wonder Name</div>
                <span class="wonder-face" th:text="'Face ' + ${wonder.face}">Face A</span>
                
                <div class="wonder-info">
                    <strong>Stages:</strong> <span th:text="${wonder.numberOfStages}">3</span>
                </div>
                
                <div class="resources" th:if="${!wonder.startingResources.isEmpty()}">
                    <strong>Starting Resources:</strong>
                    <div th:each="entry : ${wonder.startingResources}">
                        <span th:text="${entry.key}">WOOD</span>: 
                        <span th:text="${entry.value}">1</span>
                    </div>
                </div>
                <div class="resources" th:if="${wonder.startingResources.isEmpty()}">
                    <strong>Starting Resources:</strong> None
                </div>
            </div>
        </div>
    </div>
</body>
</html>
