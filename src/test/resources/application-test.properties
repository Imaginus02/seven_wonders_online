spring.application.name=wonders

# H2 In-Memory Database for Testing
# Each test run gets a fresh database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disabled for tests)
spring.h2.console.enabled=false

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# SQL Initialization for Tests
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Exclude H2 internal classes from JPA scanning
spring.jpa.mapping-resources=
